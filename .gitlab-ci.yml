# GitLab CI pipeline for CPX-AP Hardware Test Automation
#
# Required CI/CD variables (set in GitLab → Settings → CI/CD → Variables):
#   CONFIG_REPO_URL    - Git URL of the test-bench-configs repository
#   CONFIG_REF         - Branch/tag of config repo (default: main)
#   TESTBENCH_ID       - Test bench identifier (e.g. bench-lab-03)
#   POCKETBASE_URL     - PocketBase server URL
#   POCKETBASE_TOKEN   - PocketBase admin token (or use PB_USERNAME / PB_PASSWORD)
#   PB_USERNAME        - PocketBase admin username
#   PB_PASSWORD        - PocketBase admin password

stages:
  - validate
  - plan
  - test
  - report

variables:
  CONFIG_REF: "main"
  DRY_RUN: "false"
  TEST_FILTER: ""
  SAFETY_CLASS_FILTER: "safe"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - ../festo-cpx-io/

# ── Stage 1: Configuration Validation ──────────────────────────────────────

validate-config:
  stage: validate
  image: python:3.12
  before_script:
    - pip install --quiet pydantic
  script:
    - |
      if [ -n "$CONFIG_REPO_URL" ]; then
        git clone --depth 1 --branch "$CONFIG_REF" "$CONFIG_REPO_URL" /tmp/config
        CONFIG_FILE="/tmp/config/${TESTBENCH_ID}.jsonc"
      else
        echo "No CONFIG_REPO_URL set — skipping config fetch"
        CONFIG_FILE="topology.jsonc"
      fi
    - python -c "
      from config_models import BenchConfig
      import json, sys
      with open('$CONFIG_FILE') as f:
          raw = f.read()
      # Strip JSONC comments
      import re
      raw = re.sub(r'//.*?\n|/\*.*?\*/', '', raw, flags=re.DOTALL)
      config = BenchConfig.model_validate_json(raw)
      print(f'✓ Config valid — {len(config.module_instances)} module(s), {len(config.test_definitions)} test(s)')
      "
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web"'
  tags: [docker]

# ── Stage 2: Dry-Run Planning ──────────────────────────────────────────────

dry-run-plan:
  stage: plan
  image: python:3.12
  before_script:
    - pip install --quiet -e ../festo-cpx-io
    - pip install --quiet fastapi uvicorn pydantic requests
  script:
    - |
      export DRY_RUN=true
      python -c "
      from resolver import TestResolver, create_basic_test_definitions
      from config_models import BenchConfig, TestBenchMetadata
      import json

      # Build minimal config from topology.jsonc
      resolver = TestResolver()
      defs = create_basic_test_definitions()
      print(f'Default test definitions: {len(defs)}')
      for t in defs:
          print(f'  {t.test_id}: {t.name} [safety={t.safety_class.value}]')
      print('Dry-run plan generation OK')
      "
  artifacts:
    paths:
      - plan.json
    expire_in: 7 days
  rules:
    - if: '$DRY_RUN == "true"'
  tags: [docker]

# ── Stage 3: Hardware Tests ────────────────────────────────────────────────

hardware-tests:
  stage: test
  image: python:3.12
  resource_group: "$TESTBENCH_ID"  # GitLab resource group prevents concurrent bench use
  before_script:
    - pip install --quiet -e ../festo-cpx-io
    - pip install --quiet fastapi uvicorn pydantic requests pytest
    - |
      if [ -n "$CONFIG_REPO_URL" ]; then
        git clone --depth 1 --branch "$CONFIG_REF" "$CONFIG_REPO_URL" /tmp/config
      fi
  script:
    - |
      export PB_URL="${POCKETBASE_URL:-http://localhost:8090}"
      export PB_USERNAME="${PB_USERNAME:-}"
      export PB_PASSWORD="${PB_PASSWORD:-}"
      export GITLAB_PIPELINE_ID="$CI_PIPELINE_ID"
      export GITLAB_JOB_ID="$CI_JOB_ID"
      export CPX_IP="${CPX_IP:-192.168.0.11}"
      export TESTBENCH_ID="${TESTBENCH_ID:-default}"

      if [ "$DRY_RUN" = "true" ]; then
        echo "DRY_RUN=true — skipping hardware tests"
        exit 0
      fi

      if [ -f "/tmp/config/${TESTBENCH_ID}.jsonc" ]; then
        BENCH_CFG="--bench-config=/tmp/config/${TESTBENCH_ID}.jsonc"
      else
        BENCH_CFG=""
      fi

      pytest tests/test_suite.py --junitxml=results.xml $BENCH_CFG --safety-class="${SAFETY_CLASS_FILTER:-safe}" --test-filter="${TEST_FILTER:-}"
  artifacts:
    paths:
      - results.json
      - logs/
    expire_in: 30 days
    reports:
      junit: results.xml
  tags: [hardware, "$TESTBENCH_ID"]
  rules:
    - if: '$DRY_RUN != "true"'
  timeout: 30 minutes

# ── Stage 4: Report Generation ─────────────────────────────────────────────

generate-report:
  stage: report
  image: python:3.12
  needs: [hardware-tests]
  before_script:
    - pip install --quiet requests
  script:
    - |
      if [ -f results.json ]; then
        python -c "
        import json
        with open('results.json') as f:
            data = json.load(f)
        tests = data.get('tests', {})
        total = len(tests)
        passed = sum(1 for v in tests.values() if v.get('passed', False))
        print(f'=== Test Report ===')
        print(f'Total: {total}, Passed: {passed}, Failed: {total - passed}')
        for name, result in tests.items():
            status = '✓' if result.get('passed') else '✗'
            print(f'  {status} {name}')
        "
      fi
  artifacts:
    paths:
      - results.json
    expire_in: 30 days
  rules:
    - if: '$DRY_RUN != "true"'
  tags: [docker]
