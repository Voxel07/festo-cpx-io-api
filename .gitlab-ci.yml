# GitLab pipeline for API-owned CPX-AP test execution.
#
# Required variables:
#   CONFIG_REPO_URL, CONFIG_REF, TESTBENCH_ID
#   POCKETBASE_URL and POCKETBASE_TOKEN (or PB_USERNAME/PB_PASSWORD)
# Optional safety controls:
#   TEST_FILTER, SAFETY_CLASS_FILTER, ALLOW_DESTRUCTIVE, ALLOW_NEGATIVE,
#   PER_TEST_TIMEOUT_S, CPX_IP

stages: [validate, plan, build, test, report]

variables:
  CONFIG_REF: "main"
  TEST_FILTER: ""
  SAFETY_CLASS_FILTER: "safe"
  ALLOW_DESTRUCTIVE: "false"
  ALLOW_NEGATIVE: "false"
  PER_TEST_TIMEOUT_S: "300"
  TEST_API_URL: "http://127.0.0.1:8000"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  FESTO_CONFIG_ROOTS: "/tmp/config"

cache:
  paths:
    - .cache/pip
    - ../festo-cpx-io/

.api-job:
  image: python:3.12
  before_script:
    - pip install --quiet -e ../festo-cpx-io
    - pip install --quiet -r requirements.txt
    - |
      if [ -n "$CONFIG_REPO_PATH" ]; then
        export FESTO_CONFIG_ROOTS="$CONFIG_REPO_PATH"
        export CONFIG_FILE="$CONFIG_REPO_PATH/${TESTBENCH_ID}.jsonc"
        export CONFIG_COMMIT="$(git -C "$CONFIG_REPO_PATH" rev-parse HEAD 2>/dev/null || true)"
      else
        git clone --depth 1 --branch "$CONFIG_REF" "$CONFIG_REPO_URL" /tmp/config
        export FESTO_CONFIG_ROOTS="/tmp/config"
        export CONFIG_FILE="/tmp/config/${TESTBENCH_ID}.jsonc"
        export CONFIG_COMMIT="$(git -C /tmp/config rev-parse HEAD)"
      fi
    - export PB_URL="${POCKETBASE_URL:-http://localhost:8090}"
    - python -m uvicorn api:app --host 127.0.0.1 --port 8000 > api.log 2>&1 &
    - python ci_api_client.py plan --config "$CONFIG_FILE" --output /tmp/api-ready-plan.json

validate-config:
  extends: .api-job
  stage: validate
  script:
    - python ci_api_client.py plan --config "$CONFIG_FILE" --output validation-plan.json
  artifacts:
    when: always
    paths: [validation-plan.json, api.log]
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web"'
  tags: [docker]

resolve-plan:
  extends: .api-job
  stage: plan
  script:
    - python ci_api_client.py plan --config "$CONFIG_FILE" --output plan.json
  artifacts:
    when: always
    paths: [plan.json, api.log]
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web"'
  tags: [docker]

hardware-tests:
  extends: .api-job
  stage: test
  resource_group: "$TESTBENCH_ID"
  script:
    - python ci_api_client.py run --config "$CONFIG_FILE" --output results.json --junit results.xml
  artifacts:
    when: always
    paths: [plan.json, results.json, results.xml, api.log]
    reports:
      junit: results.xml
    expire_in: 30 days
  tags: [hardware, "$TESTBENCH_ID"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web"'
  timeout: 45 minutes

generate-report:
  stage: report
  image: python:3.12
  needs:
    - job: hardware-tests
      artifacts: true
  script:
    - python -c "import json; d=json.load(open('results.json')); print(json.dumps({'run_id':d.get('run_id'),'status':d.get('status'),'progress':d.get('progress')},indent=2))"
  artifacts:
    paths: [results.json, results.xml]
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web"'
  tags: [docker]

docker-build:
  stage: build
  image: docker:latest
  services: [docker:dind]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - apk add --no-cache git
    - git clone --depth 1 --branch "${CI_COMMIT_TAG}" "${CPXIO_REPO_URL}" ../festo-cpx-io || git clone --depth 1 "${CPXIO_REPO_URL}" ../festo-cpx-io
    - git clone --depth 1 --branch "${CI_COMMIT_TAG}" "${GUI_REPO_URL}" ../festo-cpx-io-gui || git clone --depth 1 "${GUI_REPO_URL}" ../festo-cpx-io-gui
  script:
    - docker build --file festo-cpx-io-api/Dockerfile --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" --tag "$CI_REGISTRY_IMAGE:latest" ..
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_TAG'
  tags: [docker]
